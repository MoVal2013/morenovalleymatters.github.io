<!DOCTYPE html>
<html lang="en">
<head>
<link rel="icon" href="favicon.png?v=1">
<link rel="shortcut icon" href="favicon.png?v=1">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Moreno Valley Matters</title>

<style>
    body {
        font-family: Arial, sans-serif;
        margin: 0;
        text-align: center;
        color: #333;

        background: linear-gradient(
            rgba(255,255,255,0.58),
            rgba(255,255,255,0.58)
        ),
        url('background.jpg');

        background-size: cover;
        background-position: center;
        background-attachment: fixed;
    }

    .container {
        max-width: 520px;
        margin: auto;
        padding: 10px 20px 40px;
    }

    img.logo {
        width: 420px;
        max-width: 90%;
        margin-bottom: 5px;
    }

    h1 {
        margin-top: 8px;
        margin-bottom: 18px;
        font-size: 24px;
    }

    .section {
        margin: 32px 0;
    }

    .section h2 {
        font-size: 17px;
        font-weight: 600;
        margin-bottom: 10px;
    }

    .btn {
        display: block;
        margin: 8px auto;
        padding: 12px;
        max-width: 380px;
        border-radius: 8px;

        text-decoration: none;
        font-size: 14px;
        font-weight: 600;

        color: white;
        background-color: #0ea5a4;
    }

    .btn:hover {
        background-color: #0c8f8e;
    }

    .info-box {
        max-width: 380px;
        margin: 6px auto 12px;
        padding: 10px 14px;
        border-radius: 8px;

        background-color: rgba(14,165,164,0.18);
        border: 1px solid rgba(14,165,164,0.25);

        font-size: 13px;
        color: #333;
        line-height: 1.4;
        text-align: center;
    }

    .note {
        font-size: 13px;
        color: #555;
        margin-top: 28px;
    }
    
</style>
</head>

<body>

<div class="container">

    <img src="moreno-valley-matters-logo.png" alt="Moreno Valley Matters Logo" class="logo">

    <div class="tagline">
        Local news, alerts, and community updates for Moreno Valley since 2013.
    </div>

    <a class="btn" href="https://www.facebook.com/groups/morenovalleymatters" target="_blank">
        Join the Facebook Group
    </a>
    
    <a class="btn" href="https://www.facebook.com/morenovalleymattersofficial" target="_blank">
        Follow Our Facebook Page
    </a>

    <a class="btn" href="https://instagram.com/morenovalleymatters" target="_blank">
        Follow on Instagram
    </a>

    <a class="btn" href="https://instagram.com/morenovalleymatters" target="_blank">
        Submit a Tip
    </a>
    
    <a class="btn" href="resources.html" target="_blank">
        Community Resources
    </a>
    
    <a class="btn" href="advertise.html">
    Advertise with Moreno Valley Matters
    </a>

    

</div>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<link rel="icon" href="favicon.png?v=1">
<link rel="shortcut icon" href="favicon.png?v=1">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Moreno Valley Matters</title>

<style>
    body {
        font-family: Arial, sans-serif;
        margin: 0;
        text-align: center;
        color: #333;

        background: linear-gradient(
            rgba(255,255,255,0.58),
            rgba(255,255,255,0.58)
        ),
        url('background.jpg');

        background-size: cover;
        background-position: center;
        background-attachment: fixed;
    }

    .container {
        max-width: 500px;
        margin: auto;
        padding: 20px 20px;
    }

    img.logo {
        width: 420px;
        max-width: 100%;
        height: auto;
        margin-bottom: 15px;
    }

    .tagline {
        font-size: 16px;
        font-weight: 500;
        text-shadow: 0 1px 2px rgba(255,255,255,0.6);
        max-width: 400px;
        margin: 10px auto 25px;
        margin-bottom: 30px;
        color: #2a3338;
    }

    .btn {
        display: block;
        margin: 10px 0;
        padding: 14px;
        border-radius: 8px;
        text-decoration: none;
        font-size: 16px;
        font-weight: bold;
        color: white;
        background-color: #0ea5a4;
        transition: 0.2s;
    }

    .btn:hover {
        background-color: #0ea5a4;
    }

</style>
</head>

<body>

<div class="container">

    <img src="moreno-valley-matters-logo.png" alt="Moreno Valley Matters Logo" class="logo">

    <div class="tagline">
        Local news, alerts, and community updates for Moreno Valley since 2013.
    </div>

    <a class="btn" href="https://www.facebook.com/groups/morenovalleymatters" target="_blank">
        Join the Facebook Group
    </a>
    
    <a class="btn" href="https://www.facebook.com/morenovalleymattersofficial" target="_blank">
        Follow Our Facebook Page
    </a>

    <a class="btn" href="https://instagram.com/morenovalleymatters" target="_blank">
        Follow on Instagram
    </a>

    <a class="btn" href="https://instagram.com/direct/t/morenovalleymatters" target="_blank">
        Submit a Tip
    </a>
    
    <a class="btn" href="https://ieinfosvcs.com/moreno-valley-community-resources-outreach-directory/" target="_blank">
        Community Resources
    </a>
    
    <a class="btn" href="advertise.html">
    Advertise with Moreno Valley Matters®
    </a>

    

</div>

</body>
</html>
